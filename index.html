<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ابن مالك — منتجات غذائية فاخرة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Playfair+Display:wght@700;900&family=Montserrat:wght@600;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lama+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ═══════════════════════════════
   DESIGN TOKENS
═══════════════════════════════ */
:root{
  --cream:#fdfbf7; --cream2:#f4efe6; --cream3:#ece5d8;
  --gold:#c8973a; --gold2:#e8b84b; --gold3:#9a6f20;
  --dark:#12100e; --dark2:#1e1b18; --dark3:#2d2924;
  --white:#fff; --txt:#1a1a1a; --txt2:#555; --txt3:#999;
  --green:#2d7a2a; --blue:#1565c0; --red:#c62828; --purple:#6a1b9a; --teal:#006064;
  --sh: 0 6px 28px rgba(0,0,0,0.09);
  --sh2: 0 18px 56px rgba(0,0,0,0.16);
  --r:22px; --tr:all 0.32s cubic-bezier(.4,0,.2,1);
}
.price-tag {
    background-color: #000000 !important;
    background: #000000 !important;
    color: #ffffff !important;
}
.price-tag * {
    color: #ffffff !important;
}
/* إجبار نافذة التعديل والإضافة على الظهور في المقدمة فوق الأدمن */
#prodEditor {
    display: none; /* سيتم التحكم بظهوره عبر الجافا سكريبت الخاصة بموقعك */
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    background: rgba(0, 0, 0, 0.75) !important; /* خلفية داكنة ممتازة لتركيز العين على النافذة */
    z-index: 999999 !important; /* رقم ضخم ليقفز فوق واجهة الأدمن */
    align-items: center;
    justify-content: center;
    overflow-y: auto !important;
}

/* لضمان ظهور الكارت الداخلي بوضوح وفي المنتصف */
#prodEditor .modal {
    margin: 30px auto !important;
    z-index: 1000000 !important;
    position: relative !important;
}

/* لجعل النافذة تظهر عندما يضيف لها الكود كلاس الفتح */
#prodEditor.open {
    display: flex !important;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--cream);color:var(--txt);overflow-x:hidden;direction:rtl}

/* ═══════════════════════════════
   NAVBAR
═══════════════════════════════ */
.navbar{
  position:sticky;top:0;z-index:500;
  background:rgba(253,251,247,.94);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(200,151,58,.15);
  padding:0 clamp(12px,4vw,60px);height:70px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  transition:box-shadow .3s;
}
.navbar.scrolled{box-shadow:var(--sh);}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.nav-logo img{height:46px;width:46px;object-fit:contain;border-radius:10px;}
.nav-logo-txt .brand{font-family:'Playfair Display',serif;font-size:17px;font-weight:900;color:var(--dark);}
.nav-logo-txt .sub{font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:700;}
.nav-tabs{display:flex;gap:4px;list-style:none;}
.nav-tabs button{
  background:none;border:none;cursor:pointer;font-family:'Cairo',sans-serif;
  font-size:14px;font-weight:700;color:var(--txt2);
  padding:8px 18px;border-radius:50px;transition:var(--tr);white-space:nowrap;
}
.nav-tabs button:hover,.nav-tabs button.active{background:var(--dark);color:var(--white);}
.nav-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.search-wrap{position:relative;}
.search-input{
  border:1.5px solid rgba(200,151,58,.25);border-radius:50px;
  padding:8px 36px 8px 16px;font-family:'Cairo',sans-serif;font-size:13px;
  width:170px;background:rgba(255,255,255,.8);transition:var(--tr);outline:none;
}
.search-input:focus{width:210px;border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,151,58,.12);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:13px;pointer-events:none;}
.cart-btn{
  position:relative;background:var(--dark);color:var(--white);border:none;border-radius:50px;
  padding:9px 20px;cursor:pointer;display:flex;align-items:center;gap:8px;
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;transition:var(--tr);
}
.cart-btn:hover{background:var(--gold3);transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.2);}
